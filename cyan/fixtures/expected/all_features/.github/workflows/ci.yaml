name: CI
on:
  push: null
jobs:
  precommit:
    name: Pre-Commit
    uses: ./.github/workflows/⚡reusable-precommit.yaml
    secrets: inherit
    with:
      atomi_platform: test-platform
      atomi_service: test-service
  docker-ci:
    name: Docker CI
    permissions:
      contents: read
      packages: write
    runs-on:
      - nscloud-ubuntu-22.04-amd64-32x64-with-cache
      - nscloud-cache-size-50gb
    strategy:
      matrix:
        image:
          - name: test-platform-test-service
            context: .
            dockerfile: infra/Dockerfile
            platform: linux/amd64,linux/arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Namespace
        uses: namespacelabs/nscloud-setup@v0
      - name: Setup Namespace buildx
        uses: namespacelabs/nscloud-setup-buildx-action@v0
      - name: Build & Push (cached)
        env:
          DOMAIN: ghcr.io
          GITHUB_REPO_REF: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_BRANCH: ${{ github.ref_name }}
          DOCKER_USER: ${{ github.actor }}
          DOCKER_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
          LATEST_BRANCH: main
          CI_DOCKER_IMAGE: ${{ matrix.image.name }}
          CI_DOCKER_CONTEXT: ${{ matrix.image.context }}
          CI_DOCKERFILE: ${{ matrix.image.dockerfile }}
          CI_DOCKER_PLATFORM: ${{ matrix.image.platform }}
        run: bash scripts/ci/ci-docker.sh
  helm-lint:
    name: Helm Lint
    runs-on:
      - nscloud-ubuntu-22.04-amd64-32x64-with-cache
      - nscloud-cache-size-50gb
      - nscloud-cache-tag-test-platform-test-service-nix-store-cache
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Nix
        uses: AtomiCloud/actions.setup-nix@v2
        with:
          checkout: false
      - name: Lint Helm chart
        run: nix develop .#helm -c ./scripts/ci/helm-lint.sh
  helm-ci:
    name: Helm CI
    permissions:
      contents: read
      packages: write
    runs-on:
      - nscloud-ubuntu-22.04-amd64-32x64-with-cache
      - nscloud-cache-size-50gb
      - nscloud-cache-tag-test-platform-test-service-nix-store-cache
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Nix
        uses: AtomiCloud/actions.setup-nix@v2
        with:
          checkout: false
      - name: Package & Push (per commit)
        env:
          DOMAIN: ghcr.io
          GITHUB_REPO_REF: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_BRANCH: ${{ github.ref_name }}
          DOCKER_USER: ${{ github.actor }}
          DOCKER_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: nix develop .#helm -c ./scripts/ci/ci-helm.sh

