version: '3'
tasks:
  lint:
    desc: 'Lint the Helm chart'
    cmds:
      - helm lint infra/root_chart
  docs:
    desc: 'Generate Helm chart documentation'
    cmds:
      - helm-docs --chart-search-root infra/root_chart
  build:
    desc: 'Package & push the Helm chart'
    cmds:
      - ./scripts/ci/helm.sh ./infra/root_chart
