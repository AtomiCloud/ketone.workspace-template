version: '3'
tasks:
  lint:
    desc: 'Lint the Helm chart'
    cmds:
      - ./scripts/ci/helm-lint.sh
  docs:
    desc: 'Generate Helm chart documentation'
    cmds:
      - helm-docs --chart-search-root infra/root_chart
  build:
    desc: 'CI: package & push the Helm chart(s), versioned per commit'
    cmds:
      - ./scripts/ci/ci-helm.sh
  release:
    desc: 'CD: repackage & push the Helm chart(s) at the release version'
    cmds:
      - ./scripts/ci/cd-helm.sh
