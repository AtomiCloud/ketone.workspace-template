name: CD
on:
  push:
    tags:
      - 'v*.*.*'
jobs:
  helm:
    name: Helm Chart
    uses: ./.github/workflows/⚡reusable-helm.yaml
    secrets: inherit
    with:
      atomi_platform: let__platform__
      atomi_service: let__service__
      chart_path: ./infra/root_chart
      version: ${{ github.ref_name }}
