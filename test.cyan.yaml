tests:
  - name: base_only
    expected:
      type: snapshot
      value:
        path: cyan/fixtures/expected/base_only
    answer_state:
      atomi/platform:
        type: String
        value: test-platform
      atomi/service:
        type: String
        value: test-service
      atomi/llm:
        type: Bool
        value: false
      atomi/docker:
        type: Bool
        value: false
      atomi/helm:
        type: Bool
        value: false
      atomi/secret:
        type: Bool
        value: false
      cyan/nix/basic:
        type: String
        value: 'yes'
      cyan/nix/llm:
        type: String
        value: 'no'
    validate:
      - find . -name '*.sh' -exec bash -n {} +
      - grep -q '^tasks:' Taskfile.yaml
      - test ! -f CLAUDE.md
      - test ! -d .claude
      - test ! -f flake.nix
      - "! grep -rqE 'let__[a-zA-Z_]+__' ."
      - ruby -ryaml -e 'Dir.glob("**/*.yaml").each { |f| YAML.safe_load(File.read(f)) }; Dir.glob("**/*.yml").each { |f| YAML.safe_load(File.read(f)) }'
    deterministic_state: {}

