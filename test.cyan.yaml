      atomi/helm:
        type: Bool
        value: false
      atomi/secret:
        type: Bool
        value: true
      cyan/nix/basic:
        type: String
        value: 'yes'
      cyan/nix/llm:
        type: String
        value: 'no'
    validate:
      - find . -name '*.sh' -exec bash -n {} +
      - test -f scripts/local/secrets.sh
      - grep -q '^### Secrets' .gitignore
      - test -f .claude/skills/infisical/SKILL.md
      - grep -F 'infisical run --env=dev -- ' docs/developer/standard/infisical.md
      - 'ruby -ryaml -e ''doc=YAML.safe_load(File.read("Taskfile.yaml")); cmds=doc["tasks"]["setup"]["cmds"]; exit(cmds.is_a?(Array) && cmds.include?("./scripts/local/secrets.sh") && cmds.size > 1 ? 0 : 1)'''
      - test "$(find .claude/skills -name SKILL.md | wc -l | tr -d ' ')" = "8"
      - '! grep -rxq '':'' nix/*.nix'
      - test ! -f flake.nix
      - "! grep -rqE 'let__[a-zA-Z_]+__' ."
      - ruby -ryaml -e 'Dir.glob("**/*.yaml").each { |f| YAML.safe_load(File.read(f)) }; Dir.glob("**/*.yml").each { |f| YAML.safe_load(File.read(f)) }'
