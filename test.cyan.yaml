    validate:
      - find . -name '*.sh' -exec bash -n {} +
      - grep -q '^  docker:' Taskfile.yaml
      - grep -q '^  helm:' Taskfile.yaml
      - grep -q '^  secret:' Taskfile.yaml
      - grep -q 'precommit' .github/workflows/ci.yaml
      - grep -q 'docker-build' .github/workflows/ci.yaml
      - grep -q 'helm-lint' .github/workflows/ci.yaml
      - grep -q 'docker-push' .github/workflows/cd.yaml
      - grep -q 'helm-publish' .github/workflows/cd.yaml
      - grep -q '^### Secrets' .gitignore
      - test "$(grep -c '^### ' .gitignore)" -ge 6
      - grep -q '^# Docker' CLAUDE.md
      - grep -q '^# Helm' CLAUDE.md
      - grep -q '^# Secret Management' CLAUDE.md
      - test "$(find .claude/skills -name SKILL.md | wc -l | tr -d ' ')" = "10"
      - 'test "$(head -n1 nix/shells.nix | tr -d ''{}: '' | tr '','' ''\n'' | sort | paste -sd, -)" = "env,packages,pkgs,shellHook"'
      - '! grep -rxq '':'' nix/*.nix'
      - test ! -f flake.nix
      - "! grep -rqE 'let__[a-zA-Z_]+__' ."
      - ruby -ryaml -e 'Dir.glob("**/*.yaml").each { |f| YAML.safe_load(File.read(f)) }; Dir.glob("**/*.yml").each { |f| YAML.safe_load(File.read(f)) }'
    deterministic_state: {}

